<!DOCTYPE html>
<html>
<head>
    <title>BGP Simulator | CSE3150 Course Project</title>
    <link rel="stylesheet" type="text/css" href="web.css">
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Red_circle_frame_transparent.svg/1280px-Red_circle_frame_transparent.svg.png?_=20200702141926">
</head>
<body>
<header>
    <h2 class="title">BGP Simulator</h2>
    <hr size="1" color="#930500">
</header>

    <h1 class="overview">A C++ simulator of the BGP (Border Gateway Protocol) internet routing system.  
                     <br>The program builds an AS graph from CAIDA topology data, seeds announcements, 
                     <br>propagates them through the graph using BGP/ROV policies, and outputs 
                     <br>the resulting routing table to CSV.</h1>

    <table>
        <tr>
            <td>
                <input type="file" id="file1" style="display:none">
                <button class="choose_btn" onclick="document.getElementById('file1').click()">Choose CAIDA file</button>
                <p><span id="file1-name" class="chosen_file"></span></p>
            </td>
            <td>
                <input type="file" id="file2" style="display:none">
                <button class="choose_btn" onclick="document.getElementById('file2').click()">Choose announcement file</button>
                <p><span id="file2-name" class="chosen_file"></span></p>
            </td>
            <td>
                <input type="file" id="file3" style="display:none">
                <button class="choose_btn" onclick="document.getElementById('file3').click()">Choose ROV file</button>
                <p><span id="file3-name" class="chosen_file"></span></p>
            </td>
        </tr>
    </table>

    <button class="run_btn" id="run">RUN</button>

    <script src="web_program.js"></script>
    <script src="web.js"></script>

</body>
</html>
